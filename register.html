<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/styles/register.css">
        <title>Plantty</title>
    </head>

    <body>
        <main>
            <section class="login">
                <div class="image-container">
                    <img src="assets/images/plant-logo.svg" class="plant-image" alt="Planta">
                </div>

                <div class="title">
                    <h2>Registre-se</h2>
                    <div class="welcome-text">
                        <span>Olá administrador, seja bem-vindo a tela de registro.</span>
                    </div>
                </div>
                
                <div id="form">
                    <form action="">
                        <div class="input-group">
                            <label for="user">Usuário</label>
                            <input type="text" name="user" id="user" placeholder="Nome de usuário">
                        </div>
                        
                        <div class="input-group">
                            <label for="user">Senha</label>
                            <input type="text" name="password" id="password" placeholder="Min. 8 caractéres">
                        </div>

                        <div class="input-group">
                            <label for="user">Senha novamente</label>
                            <input type="text" name="password" id="password" placeholder="Min. 8 caractéres">
                        </div>

                        <div class="input-group">   
                            <label for="user">Código de registro</label>

                            <div class="register">   
                                <input type="text" name="register-code" id="register-code" placeholder="Código">
                                <button type="submit">Registrar</button>
                            </div>                        
                        </div>
                    </form>
                </div>

                <div class="account">
                    <span>Já possui conta?</span>
                    <a href="login.html" class="create-account">Entrar</a>
                </div>
            </section>

            <section class="informations">
                <div class="card-images">
                    <img src="assets/images/pin.svg" class="pin-image" alt="Local PIN">
                    <img src="assets/images/sun.svg" class="sun-image" alt="Sol">
                    <img src="assets/images/cultivate-plant.svg" class="cultivate-image" alt="Cultivar">
                </div>
                <div class="cultivate-message">
                    <h2>Cultive plantas ao redor do mundo</h2>
                    <small>O planeta agradece!</small>
                </div>
            </section>
        </main>
    </body>
</html>
